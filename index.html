<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Crialta Marketing</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
    }

    header {
      text-align: center;
      padding: 80px 20px;
    }

    h1 {
      font-size: 42px;
      margin-bottom: 10px;
    }

    p {
      color: #cbd5f5;
    }

    .btn {
      display: inline-block;
      margin-top: 20px;
      padding: 15px 25px;
      background: #3b82f6;
      color: white;
      text-decoration: none;
      border-radius: 8px;
    }

    section {
      padding: 60px 20px;
      text-align: center;
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      max-width: 900px;
      margin: auto;
    }

    .card {
      background: #1e293b;
      padding: 20px;
      border-radius: 10px;
    }

    footer {
      text-align: center;
      padding: 30px;
      background: #020617;
    }
  </style>
</head>

<body>

<header>
  <h1>Crialta Marketing</h1>
  <p>Impulsionamos seu negócio com tráfego pago e estratégia digital</p>
  <a class="btn" href="#">Fale conosco</a>
</header>

<section>
  <h2>Serviços</h2>
  <div class="cards">
    <div class="card">Gestão de Tráfego Pago</div>
    <div class="card">Social Media</div>
    <div class="card">Criação de Sites</div>
  </div>
</section>

<section>
  <h2>Por que escolher a Crialta?</h2>
  <p>Estratégias personalizadas para crescimento real do seu negócio.</p>
</section>

<footer>
  <p>© 2026 Crialta Marketing</p>
</footer>

</body>
</html>
